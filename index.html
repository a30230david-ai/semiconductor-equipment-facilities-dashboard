  <script>
    const DATA=JSON.parse(document.getElementById("dashboard-data").textContent);
    const COMPANIES=DATA.companies;
    const SOURCE_MAP=new Map(DATA.sources.map(source=>[source.id,source]));
    const METRICS=[
      {key:"revenue",label:"營收",unit:"仟元",kind:"line",meaning:"公司在該季認列的營業收入。",read:"搭配毛利率與現金流判讀，單看成長不代表獲利品質同步改善。"},
      {key:"gross_margin",label:"毛利率",unit:"%",kind:"line",meaning:"毛利占營收的比率，由營收與毛利計算。",read:"上升可能反映產品組合或成本改善；下降需回看價格、稼動率與成本。"},
      {key:"operating_income",label:"營業利益",unit:"仟元",kind:"bar",meaning:"扣除營業成本與營業費用後的本業成果。",read:"用來觀察營收成長是否轉化為核心獲利。"},
      {key:"net_income",label:"淨利（依來源口徑）",unit:"仟元",kind:"bar",meaning:"各來源列示的淨利，口徑依原始財報或轉載頁。",read:"不同公司或季度可能含非經常項目，不統一宣稱為歸屬母公司淨利。"},
      {key:"eps",label:"EPS",unit:"元",kind:"line",meaning:"每股盈餘，依來源揭露口徑。",read:"與淨利口徑及股本變化一起核對。"},
      {key:"free_cash_flow",label:"自由現金流",unit:"仟元",kind:"bar",meaning:"營業現金流減資本支出絕對值。",read:"缺少現金流或資本支出時維持未揭露，不以零值替代。"},
      {key:"inventory",label:"存貨",unit:"仟元",kind:"line",meaning:"資產負債表期末存貨。",read:"需結合營收、訂單與產品週期，不以單季增加直接判定好壞。"},
      {key:"accounts_receivable",label:"應收帳款",unit:"仟元",kind:"line",meaning:"資產負債表期末應收款項。",read:"若增速長期高於營收，需追蹤收款與認列品質。"},
      {key:"contract_liabilities",label:"合約負債",unit:"仟元",kind:"line",meaning:"已收款但尚未履約認列的期末餘額。",read:"採用報表未列示時維持未揭露，不由其他科目推估。"}
    ];
    let activeView="overview";
    let activeMetric="revenue";

    function escapeHtml(value){return String(value).replace(/[&<>"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[char])}
    function display(value,unit=""){
      if(value===null||!Number.isFinite(Number(value)))return "未揭露";
      const number=Number(value);
      if(unit==="%")return `${number.toFixed(2)}%`;
      if(unit==="元")return number.toFixed(2);
      return new Intl.NumberFormat("zh-TW",{maximumFractionDigits:0}).format(number);
    }
    function directIds(item){const ids=[];if(item&&item.source_id)ids.push(item.source_id);if(item&&Array.isArray(item.source_ids))ids.push(...item.source_ids);return [...new Set(ids)]}
    function sourceLinks(ids){
      const available=[...new Set(ids||[])].map(id=>SOURCE_MAP.get(id)).filter(Boolean);
      if(!available.length)return '<span class="muted">未揭露</span>';
      return available.map(source=>`<a href="${escapeHtml(source.url)}" target="_blank" rel="noreferrer">來源</a>`).join("、");
    }
    function probabilityText(value){
      if(value===null)return "未揭露";
      return `正向 ${value.positive}%／負向 ${value.negative}%／證據不足 ${value.unclear}%`;
    }
    function coverage(records,fields){return `${records.filter(row=>fields.every(field=>row[field]!==null)).length}/${records.length}`}
    function statusBadge(status){return `<span class="status ${status==="已揭露"?"disclosed":"inferred"}">${status}</span>`}
    function itemText(item){const share=item.share===null?"未揭露":`${item.share}%`;return `${escapeHtml(item.label)}（占比：${share}）`}
    function renderClaims(items){
      return `<ul class="claim-list">${items.map(item=>{
        const links=item.status==="已揭露"?` <span class="source-links">${sourceLinks(directIds(item))}</span>`:"";
        return `<li><div class="claim-title">${statusBadge(item.status)}<strong>${itemText(item)}</strong></div>${links}</li>`;
      }).join("")}</ul>`;
    }
    function latestRecord(company){return company.records[company.records.length-1]}
    function scoreBar(label,value){return `<div class="score-row"><span>${escapeHtml(label)}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.max(0,Math.min(100,value))}%"></div></div><span>${value}</span></div>`}

    function renderOverview(){
      const tickers=Object.keys(COMPANIES);
      const latest=DATA.common_periods[DATA.common_periods.length-1];
      const rows=tickers.map(ticker=>{const company=COMPANIES[ticker],record=latestRecord(company);return `<tr><td><strong>${escapeHtml(company.name)}</strong><br><span class="muted">${ticker}</span></td><td>${display(record.revenue)}</td><td>${display(record.gross_margin,"%")}</td><td>${display(record.operating_income)}</td><td>${display(record.net_income)}</td><td>${display(record.eps,"元")}</td><td>${display(record.free_cash_flow)}</td><td>${sourceLinks(directIds(record))}</td></tr>`}).join("");
      const matrix=tickers.map(ticker=>{const company=COMPANIES[ticker],business=company.business_model;return `<tr><td><strong>${escapeHtml(company.name)}</strong></td><td>${statusBadge(business.status)} ${escapeHtml(business.label)}</td><td>${company.product_mix.map(item=>`${statusBadge(item.status)} ${itemText(item)}`).join("<br>")}</td><td>${company.exposure.map(item=>`${statusBadge(item.status)} ${itemText(item)}`).join("<br>")}</td></tr>`}).join("");
      const quality=tickers.map(ticker=>{const company=COMPANIES[ticker];return `<tr><td>${escapeHtml(company.name)}</td><td>${company.quality_score}</td><td>${company.disclosure_confidence}</td><td>${probabilityText(company.order_visibility_probability)}</td><td>${probabilityText(company.inventory_probability)}</td></tr>`}).join("");
      const valuation=tickers.map(ticker=>{const company=COMPANIES[ticker],item=company.valuation;return `<tr><td>${escapeHtml(company.name)}</td><td>${display(item.price)}</td><td>${display(item.pe,"元")}</td><td>${display(item.pb,"元")}</td><td>${display(item.dividend_yield,"%")}</td><td>${escapeHtml(item.price_as_of||"未揭露")}</td><td>${sourceLinks([item.source_id])}</td></tr>`}).join("");
      const observations=tickers.map(ticker=>{const company=COMPANIES[ticker],record=latestRecord(company);return `<li><div class="claim-title">${statusBadge("推論")}<strong>${escapeHtml(company.name)}</strong></div>${escapeHtml(company.cycle_position.replace(/^推論：/,""))} <span class="source-links">${sourceLinks(directIds(record))}</span></li>`}).join("");
      const sourceList=DATA.sources.map(source=>`<li><a href="${escapeHtml(source.url)}" target="_blank" rel="noreferrer">${escapeHtml(source.title)}</a><span class="muted">${escapeHtml(source.publisher)} · ${escapeHtml(source.as_of)}</span></li>`).join("");
      document.getElementById("dashboard-view").innerHTML=`
        <div class="stack">
          <section class="summary-grid" aria-label="研究摘要">
            <div class="panel summary-item"><span>共同季度</span><strong>${latest}</strong></div>
            <div class="panel summary-item"><span>比較公司</span><strong>4</strong></div>
            <div class="panel summary-item"><span>世禾 FCF 覆蓋</span><strong>${coverage(COMPANIES["3551"].records,["free_cash_flow"])}</strong></div>
            <div class="panel summary-item"><span>估值資料日</span><strong>${escapeHtml(DATA.valuation_as_of)}</strong></div>
          </section>
          <section class="panel"><div class="section-head"><div><h2>最新共同季度</h2><p>金額單位為新台幣仟元；缺值不轉為零。</p></div><span class="status calculated">計算與來源值</span></div><div class="table-wrap"><table><thead><tr><th>公司</th><th>營收</th><th>毛利率</th><th>營業利益</th><th>淨利（依來源口徑）</th><th>EPS</th><th>自由現金流</th><th>來源</th></tr></thead><tbody>${rows}</tbody></table></div></section>
          <section class="panel"><div class="section-head"><div><h2>商業位置矩陣</h2><p>只有資料項目本身帶直接來源才標為已揭露。</p></div></div><div class="table-wrap"><table class="matrix"><thead><tr><th>公司</th><th>商業模式</th><th>產品與服務</th><th>主要曝險</th></tr></thead><tbody>${matrix}</tbody></table></div></section>
          <section class="two-col">
            <div class="panel"><h2>品質與證據機率</h2><div class="table-wrap"><table><thead><tr><th>公司</th><th>品質分數</th><th>揭露信心</th><th>訂單能見度</th><th>存貨判讀</th></tr></thead><tbody>${quality}</tbody></table></div></div>
            <div class="panel"><h2>分析觀察</h2><ul class="observation-list">${observations}</ul></div>
          </section>
          <section class="panel"><div class="section-head"><div><h2>估值比較</h2><p>價格與基本面日期可能不同，僅作資料整理。</p></div><span class="meta">${escapeHtml(DATA.valuation_as_of)}</span></div><div class="table-wrap"><table><thead><tr><th>公司</th><th>股價</th><th>本益比</th><th>股價淨值比</th><th>殖利率</th><th>股價日</th><th>來源</th></tr></thead><tbody>${valuation}</tbody></table></div></section>
          <section class="panel coverage-note"><h2>資料覆蓋限制</h2><p><strong>京鼎、瑞耘、漢科不進行 FCF 或營運資金排名。</strong> 缺少的現金流、存貨或應收欄位顯示未揭露，不視為零或弱勢訊號。</p><p>世禾 FCF ${coverage(COMPANIES["3551"].records,["free_cash_flow"])}；京鼎 ${coverage(COMPANIES["3413"].records,["free_cash_flow"])}；瑞耘 ${coverage(COMPANIES["6532"].records,["free_cash_flow"])}；漢科 ${coverage(COMPANIES["3402"].records,["free_cash_flow"])}。</p></section>
          <details class="panel"><summary><strong>完整來源清單</strong></summary><ul class="source-list">${sourceList}</ul></details>
        </div>`;
    }

    function renderChart(company,metric){
      const svg=document.getElementById("trend-chart");
      const rows=company.records;
      const available=rows.map((row,index)=>({index,value:row[metric.key]})).filter(item=>item.value!==null&&Number.isFinite(Number(item.value))).map(item=>({index:item.index,value:Number(item.value)}));
      if(!available.length){svg.innerHTML=`<title>${escapeHtml(metric.label)}季度趨勢</title><desc>此公司所選指標未揭露</desc><text class="empty-chart" text-anchor="middle" x="380" y="155">未揭露：所選指標沒有可比較季度資料</text>`;return}
      const W=760,H=320,pad={left:70,right:28,top:42,bottom:46},width=W-pad.left-pad.right,height=H-pad.top-pad.bottom;
      let min=Math.min(...available.map(item=>item.value)),max=Math.max(...available.map(item=>item.value));
      if(metric.kind==="bar"){min=Math.min(0,min);max=Math.max(0,max)}
      if(min===max){const adjustment=Math.abs(min)*.1||1;min-=adjustment;max+=adjustment}
      const span=max-min,x=index=>pad.left+(rows.length===1?width/2:index*width/(rows.length-1)),y=value=>pad.top+(max-value)*height/span;
      const ticks=Array.from({length:5},(_,index)=>min+span*index/4);
      const grid=ticks.map(value=>`<line class="gridline" x1="${pad.left}" x2="${W-pad.right}" y1="${y(value)}" y2="${y(value)}"></line><text class="axis-label" x="6" y="${y(value)+4}">${display(value,metric.unit)}</text>`).join("");
      const labels=rows.map((row,index)=>`<text class="axis-label" text-anchor="middle" x="${x(index)}" y="${H-14}">${escapeHtml(row.period)}</text>`).join("");
      const missing=rows.map((row,index)=>({index,value:row[metric.key]})).filter(item=>item.value===null||!Number.isFinite(Number(item.value))).map(item=>`<text class="missing-label" text-anchor="middle" x="${x(item.index)}" y="${H-30}">未揭露</text>`).join("");
      let marks="";
      if(metric.kind==="line"){
        const segments=company.line_segments[metric.key]||[];
        marks=segments.map(segment=>{const path=segment.map((item,index)=>`${index?"L":"M"} ${x(item.index)} ${y(item.value)}`).join(" ");return `<path class="chart-line" d="${path}"></path>${segment.map(item=>`<circle class="chart-point" cx="${x(item.index)}" cy="${y(item.value)}" r="5"></circle><text class="value-label" text-anchor="middle" x="${x(item.index)}" y="${y(item.value)-11}">${display(item.value,metric.unit)}</text>`).join("")}`}).join("");
      }else{
        const zero=y(0),barWidth=56;
        marks=available.map(item=>{const pointY=y(item.value),top=Math.min(pointY,zero),barHeight=Math.max(2,Math.abs(zero-pointY));return `<rect class="chart-bar ${item.value<0?"negative":""}" x="${x(item.index)-barWidth/2}" y="${top}" width="${barWidth}" height="${barHeight}"></rect><text class="value-label" text-anchor="middle" x="${x(item.index)}" y="${item.value>=0?top-9:top+barHeight+17}">${display(item.value,metric.unit)}</text>`}).join("");
      }
      svg.innerHTML=`<title>${escapeHtml(company.name)} ${escapeHtml(metric.label)}季度趨勢</title><desc>${rows.map(row=>`${row.period} ${display(row[metric.key],metric.unit)}`).join("，")}</desc>${grid}${marks}${missing}${labels}`;
    }

    function renderMetric(company){
      const metric=METRICS.find(item=>item.key===activeMetric)||METRICS[0];
      document.querySelectorAll("[data-metric]").forEach(button=>button.setAttribute("aria-pressed",String(button.dataset.metric===activeMetric)));
      document.getElementById("meaning-guide").innerHTML=`<div><h3>${escapeHtml(metric.label)}代表什麼</h3><p>${escapeHtml(metric.meaning)}</p></div><div><h3>研究時如何解讀</h3><p>${escapeHtml(metric.read)}</p></div>`;
      renderChart(company,metric);
    }

    function renderCompany(ticker){
      const company=COMPANIES[ticker],latest=latestRecord(company),valuation=company.valuation;
      const metricButtons=METRICS.map(metric=>`<button type="button" class="metric-btn" data-metric="${metric.key}" aria-pressed="${metric.key===activeMetric}">${escapeHtml(metric.label)}</button>`).join("");
      const scenarioItems=company.scenarios.map(scenario=>`<li><div class="claim-title">${statusBadge("已揭露")}<strong>${escapeHtml(scenario.name)}情境證據</strong></div><p>${escapeHtml(scenario.evidence)} <span class="source-links">${sourceLinks(scenario.source_ids)}</span></p><div class="claim-title">${statusBadge("推論")}<strong>${escapeHtml(scenario.name)}情境</strong></div><p>${escapeHtml(scenario.inference.replace(/^推論：/,""))}</p></li>`).join("");
      const fcfTrigger=latest.free_cash_flow===null?"等待官方現金流與期末營運資金資料，揭露前不納入比較。":"比較下一季自由現金流方向與營運資金變化。";
      document.getElementById("dashboard-view").innerHTML=`
        <div class="stack">
          <section class="panel"><div class="section-head"><div><p class="eyebrow">${escapeHtml(company.market)} · ${ticker}</p><h2>${escapeHtml(company.name)}</h2><p>${statusBadge(company.business_model.status)} ${escapeHtml(company.business_model.label)}</p></div><div>${scoreBar("品質分數",company.quality_score)}${scoreBar("揭露信心",company.disclosure_confidence)}</div></div><div class="stat-grid"><div class="stat"><span>最新季度</span><strong>${escapeHtml(latest.period)}</strong></div><div class="stat"><span>營收</span><strong>${display(latest.revenue)}</strong></div><div class="stat"><span>毛利率</span><strong>${display(latest.gross_margin,"%")}</strong></div><div class="stat"><span>淨利（依來源口徑）</span><strong>${display(latest.net_income)}</strong></div><div class="stat"><span>自由現金流</span><strong>${display(latest.free_cash_flow)}</strong></div></div></section>
          <section class="panel"><div class="section-head"><div><h2>季度指標趨勢</h2><p>缺值保留為未揭露，不補點、不納入比較。</p></div></div><div class="metric-controls" id="metric-controls" aria-label="財務指標">${metricButtons}</div><div class="meaning-guide" id="meaning-guide" aria-live="polite"></div><div class="chart-shell"><svg id="trend-chart" viewBox="0 0 760 320" role="img" aria-label="季度指標趨勢圖"></svg></div></section>
          <section class="two-col"><div class="panel"><h2>產品與服務</h2>${renderClaims(company.product_mix)}</div><div class="panel"><h2>主要曝險</h2>${renderClaims(company.exposure)}</div></section>
          <section class="two-col"><div class="panel"><h2>訂單能見度</h2><div class="claim-title">${statusBadge("已揭露")}<strong>直接證據</strong></div><p>${escapeHtml(company.order_visibility.evidence)} <span class="source-links">${sourceLinks(company.order_visibility.source_ids)}</span></p><div class="claim-title">${statusBadge("推論")}<strong>判讀</strong></div><p>${escapeHtml(company.order_visibility.inference.replace(/^推論：/,""))}</p><p><strong>依 evidence counts 計算：</strong>${probabilityText(company.order_visibility_probability)}</p></div><div class="panel"><h2>存貨與營運資金</h2><div class="claim-title">${statusBadge("已揭露")}<strong>直接證據</strong></div><p>${escapeHtml(company.inventory_evidence.evidence)} <span class="source-links">${sourceLinks(company.inventory_evidence.source_ids)}</span></p><div class="claim-title">${statusBadge("推論")}<strong>判讀</strong></div><p>${escapeHtml(company.inventory_evidence.inference.replace(/^推論：/,""))}</p><p><strong>依 evidence counts 計算：</strong>${probabilityText(company.inventory_probability)}</p></div></section>
          <section class="two-col"><div class="panel"><h2>估值快照</h2><div class="stat-grid"><div class="stat"><span>股價</span><strong>${display(valuation.price)}</strong></div><div class="stat"><span>本益比</span><strong>${display(valuation.pe,"元")}</strong></div><div class="stat"><span>股價淨值比</span><strong>${display(valuation.pb,"元")}</strong></div><div class="stat"><span>殖利率</span><strong>${display(valuation.dividend_yield,"%")}</strong></div><div class="stat"><span>資料日</span><strong>${escapeHtml(valuation.price_as_of||"未揭露")}</strong></div></div><p class="source-links">${sourceLinks([valuation.source_id])}</p></div><div class="panel coverage-note"><h2>公司資料覆蓋</h2><p>FCF ${coverage(company.records,["free_cash_flow"])}；存貨與應收同時覆蓋 ${coverage(company.records,["inventory","accounts_receivable"])}。</p><p>${ticker==="3551"?"可觀察已揭露趨勢。":"資料不足，不納入 FCF 或營運資金排名。"}</p></div></section>
          <section class="panel"><h2>樂觀／基準／保守情境</h2><ul class="scenario-list">${scenarioItems}</ul></section>
          <section class="panel"><h2>下一季驗證條件</h2><ol><li><strong>已揭露基準：</strong>${escapeHtml(latest.period)} 營收 ${display(latest.revenue)} 仟元、毛利率 ${display(latest.gross_margin,"%")}。 ${sourceLinks(directIds(latest))}</li><li><strong>計算條件：</strong>${escapeHtml(fcfTrigger)}</li><li><strong>推論條件：</strong>檢查營收、毛利率與現金流是否同向；單一指標改善不視為情境成立。</li></ol></section>
        </div>`;
      document.querySelectorAll("[data-metric]").forEach(button=>button.addEventListener("click",()=>{activeMetric=button.dataset.metric;renderMetric(company)}));
      renderMetric(company);
    }

    function render(){
      const panel=document.getElementById("dashboard-view");
      panel.setAttribute("aria-labelledby",`tab-${activeView}`);
      if(activeView==="overview")renderOverview();else renderCompany(activeView);
    }
    const tabs=[...document.querySelectorAll('[role="tab"]')];
    tabs.forEach((tab,index)=>{
      tab.addEventListener("click",()=>{activeView=tab.dataset.view;tabs.forEach(item=>item.setAttribute("aria-selected",String(item===tab)));render()});
      tab.addEventListener("keydown",event=>{if(!["ArrowLeft","ArrowRight"].includes(event.key))return;event.preventDefault();const step=event.key==="ArrowRight"?1:-1,next=(index+step+tabs.length)%tabs.length;tabs[next].focus();tabs[next].click()});
    });
    render();
  </script>
</body>
</html>
